<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>QPS Graph View</title>
        <link rel="stylesheet" href="jsplumbtoolkit.css">
        <link rel="stylesheet" href="jsplumbtoolkit-dialogs.css">
        <link rel="stylesheet" href="jsplumbtoolkit-connector-editors.css">
        <link rel="stylesheet" href="graphview.css">

        <script src="graphview.umd.js"></script>
        <script src="graphviewCommunication.js"></script>

        <style>
            /* Ensure the canvas fills the screen since we are in a WebView */
            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
            }
            .jtk-graphview-main {
                height: 100vh;
                width: 100vw;
                display: flex;
            }
        </style>
    </head>
    <body>

        <script type="text/jtk" id="tmplCondition">
            <div style="width:${w}px;height:${h}px;" class="jtk-node flowchart-object ui-diagram-element ui-diagram-condition" data-jtk-target="true">
            <div class="node-text"><span>${text}</span></div>
            <div class="node-edit node-action"></div>
            <div class="node-delete node-action delete"></div>
            <div class="drag-start connect" data-jtk-source="true"></div>
            </div>
        </script>

        <script type="text/jtk" id="tmplBranch">
            <div style="width:${w}px;height:${h}px;" class="jtk-node flowchart-object ui-diagram-element ui-diagram-branch" data-jtk-target="true">
            <div class="node-text"><span>${text}</span></div>
            <div class="node-edit node-action"></div>
            <div class="node-delete node-action delete"></div>
            <div class="drag-start connect" data-jtk-source="true"></div>
            </div>
        </script>

        <script type="text/jtk" id="tmplTariff">
            <div style="width:${w}px;height:${h}px;" class="jtk-node flowchart-object ui-diagram-element ui-diagram-tariff" data-jtk-target="true">
            <div class="node-text"><span>${text}</span></div>
            <div class="node-edit node-action"></div>
            <div class="node-delete node-action delete"></div>
            <div class="drag-start connect" data-jtk-source="true"></div>
            </div>
        </script>

        <div id="jtk-graphview-flowchart" class="jtk-graphview-main">

            <div class="jtk-graphview-canvas graphview-canvas-dotted">
                <div class="controls" data-can-undo="false" data-can-redo="false">
                    <i class="jtkfa selected-mode" mode="pan" title="Pan Mode">✋</i> 
                    <i class="jtkfa" mode="select" title="Select Mode">🔍</i> 
                    <i class="jtkfa" reset="" title="Zoom to Fit">⌂</i>
                    <i class="jtkfa" layout="" title="Refresh Layout">⟳</i>
                </div>
                <div class="miniview"></div>
            </div>
        </div>

        <script>
            function renderGraph(jsonData) {
                console.log("DEBUG: renderGraph entry point");
                try {
                    const data = (typeof jsonData === 'string') ? JSON.parse(jsonData) : jsonData;
                
                    if (window.QPSCoreGraphView) {
                        // Pass 'false' for read-only or 'true' for editable
                        window.QPSCoreGraphView.initJsPlumb(false, data);
                    } else {
                        console.error("FATAL: QPSCoreGraphView library not loaded from umd.js");
                    }
                } catch (e) {
                    console.error("FATAL: JSON parse error in WebView:", e);
                }
            }
        </script>
    </body>
</html>
